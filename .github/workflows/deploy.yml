name: Deploy to GitHub Pages

on:
  push:
    branches: [refresh-landing-hero]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build static export
        env:
          # Custom domain https://movez.ai (root paths)
          NEXT_PUBLIC_BASE_PATH: ""
        run: npm run build

      # Old builds used /movez.ai/... asset URLs; keep those paths working for cached browsers.
      - name: Compatibility asset paths
        run: |
          mkdir -p out/movez.ai
          cp -R out/_next out/movez.ai/_next
          cp -R out/assets out/movez.ai/assets

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
